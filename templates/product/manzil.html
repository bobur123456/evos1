<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Yetkazish manzili</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ" type="text/javascript"></script>
    
    <style>
        /* Umumiy ko'rinish */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
        }
        h2 { margin-top: 0; font-size: 24px; color: #1a1a1a; margin-bottom: 25px; text-align: center; font-weight: 700; }
        
        /* Inputlar stili */
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #edf2f7; 
            background: #f7fafc; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            margin-bottom: 15px; 
            transition: all 0.3s ease; 
        }
        input:focus { 
            border-color: #007d53; 
            outline: none; 
            background: #fff; 
            box-shadow: 0 0 0 4px rgba(0, 125, 83, 0.1);
        }
        .row { display: flex; gap: 12px; }
        
        /* Xarita */
        #map { 
            width: 100%; 
            height: 280px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        /* Tugmalar uchun konteyner */
        .button-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        /* Asosiy tugma (Saqlash) */
        .save-btn { 
            width: 100%; 
            padding: 16px; 
            background-color: #007d53; 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 17px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 125, 83, 0.2);
        }
        .save-btn:hover { 
            background-color: #005f3f; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 125, 83, 0.3);
        }
        .save-btn:active { transform: translateY(0); }

        /* Ortga qaytish tugmasi (Zo'r stil) */
        .back-link {
            text-decoration: none;
            display: block;
            width: 100%;
        }
        .back-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%; 
            padding: 14px; 
            background-color: transparent; 
            color: #718096; 
            border: 2px solid #edf2f7; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .back-btn:hover { 
            background-color: #f7fafc; 
            border-color: #cbd5e0;
            color: #2d3748;
        }
        .back-btn i { margin-right: 8px; font-style: normal; }
    </style>
</head>
<body>

<div class="card">
    <h2>Yetkazish manzili</h2>
    <form id="addressForm">
        {% csrf_token %}
        <input type="text" id="manzil" name="manzil" placeholder="Manzilni tanlang" required>
        
        <div class="row">
            <input type="text" id="uy" name="uy" placeholder="Uy/ofis">
            <input type="text" id="domofon" name="domofon" placeholder="Domofon">
        </div>
        
        <div class="row">
            <input type="text" id="kirish" name="kirish" placeholder="Kirish">
            <input type="text" id="qavat" name="qavat" placeholder="Qavat">
        </div>
        
        <input type="text" id="izoh" name="izoh" placeholder="Haydovchi uchun izoh...">

        <div id="map"></div>

        <div class="button-group">
            <button type="submit" class="save-btn">Saqlash</button>
            <a href="{% url 'aa' %}" class="back-link">
                <button type="button" class="back-btn"><i>←</i> Ortga qaytish</button>
            </a>
        </div>
    </form>
</div>

<script>
    ymaps.ready(function () {
        let myMap = new ymaps.Map("map", {
            center: [41.311081, 69.240562], 
            zoom: 13,
            controls: ['zoomControl']
        });

        let myPlacemark = new ymaps.Placemark(myMap.getCenter(), {}, { 
            draggable: true,
            preset: 'islands#darkGreenDotIconWithCaption' 
        });

        myMap.geoObjects.add(myPlacemark);

        myMap.events.add('click', function (e) {
            let coords = e.get('coords');
            myPlacemark.geometry.setCoordinates(coords);
            updateAddress(coords);
        });

        myPlacemark.events.add('dragend', function () {
            updateAddress(myPlacemark.geometry.getCoordinates());
        });

        function updateAddress(coords) {
            ymaps.geocode(coords).then(function (res) {
                let firstGeoObject = res.geoObjects.get(0);
                document.getElementById('manzil').value = firstGeoObject.getAddressLine();
            });
        }
    });

    document.getElementById('addressForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            manzil: document.getElementById('manzil').value,
            uy: document.getElementById('uy').value,
            domofon: document.getElementById('domofon').value,
            kirish: document.getElementById('kirish').value,
            qavat: document.getElementById('qavat').value,
            izoh: document.getElementById('izoh').value
        };
        console.log("Saqlanayotgan ma'lumotlar:", data);
        alert("Manzil muvaffaqiyatli saqlandi!");
    });
</script>

</body>
</html>
