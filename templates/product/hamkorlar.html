
<div class="menu-card" style="margin-bottom: 40px;">
    <div class="header-bar"></div>
    
    <div class="content" style="text-align: center;">
        <div class="image-section" style="grid-column: span 2; margin-bottom: 20px;">
            {% if product.image %}
                <img src="{{ Qirikod.image.url }}" alt="{{ product.name_uz }}" class="lavash-img" style="width: 200px; height: auto;">
            {% else %}
                <p>Rasm yuklanmagan</p>
            {% endif %}
        </div>

        <hr style="grid-column: span 2; width: 100%; border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

        <div class="lang-section" style="text-align: left; padding-left: 10px;">
            <h2 style="border-left: 4px solid #2e7d32; padding-left: 15px; font-weight: bold;">
                {{ product.name_uz }}
            </h2>
            <div class="ingredient-item" style="color: #666; font-size: 14px; margin-top: 10px; line-height: 1.6;">
                {{ product.ingredients_uz|linebreaksbr }}
            </div>
        </div>

        <div class="lang-section" style="text-align: left; padding-left: 10px;">
            <h2 style="border-left: 4px solid #2e7d32; padding-left: 15px; font-weight: bold;">
                {{ product.name_ru }}
            </h2>
            <div class="ingredient-item" style="color: #666; font-size: 14px; margin-top: 10px; line-height: 1.6;">
                {{ product.ingredients_ru|linebreaksbr }}
            </div>
        </div>

        <div style="grid-column: span 2; text-align: right; margin-top: 20px;">
            <strong style="color: #2e7d32; font-size: 18px;">Narxi: {{ product.price }} so'm</strong>
        </div>
    </div>
</div>
