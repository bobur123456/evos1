
{% load static %}
<!DOCTYPE html>
<html lang="en-US" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Falcon | Dashboard &amp; Web App Template</title>

  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,500,600,700%7cPoppins:300,400,500,600,700,800,900&amp;display=swap" rel="stylesheet">
  <link href="{% static 'vendors/overlayscrollbars/OverlayScrollbars.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/theme.min.css' %}" rel="stylesheet" id="style-default">
  <link href="{% static 'assets/css/user.min.css' %}" rel="stylesheet" id="user-style-default">

  <style>
    /* Boshida formani yashirib qo'yamiz */
    #register-section {
      display: none;
      transition: all 0.5s ease;
    }
    /* Tugma bosilganda kursorni o'zgartirish */
    .register-trigger {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main class="main" id="top">
    <div class="container-fluid">
      <div class="row min-vh-100 flex-center g-0">
        <div class="col-lg-8 col-xxl-5 py-3 position-relative">
          <img class="bg-auth-circle-shape" src="{% static 'assets/img/icons/spot-illustrations/bg-shape.png' %}" alt="" width="250">
          <img class="bg-auth-circle-shape-2" src="{% static 'assets/img/icons/spot-illustrations/shape-1.png' %}" alt="" width="150">
          
          <div class="card overflow-hidden z-index-1">
            <div class="card-body p-0">
              <div class="row g-0 h-100">
                <div class="col-md-5 text-center bg-card-gradient">
                  <div class="position-relative p-4 pt-md-5 pb-md-7 light">
                    <div class="bg-holder bg-auth-card-shape" style="background-image:url({% static 'assets/img/icons/spot-illustrations/half-circle.png' %});"></div>
                    
                    <div class="z-index-1 position-relative">
                      <div id="open-register" class="register-trigger mb-3">
                         <img src="{% static 'assets/img/icons/spot-illustrations/avatar.png' %}" alt="User" width="60" style="border-radius: 50%; background: #fff; padding: 5px;">
                         <p class="text-white mt-2">Ro'yxatdan o'tish uchun bosing</p>
                      </div>

                      <a class="link-light mb-4 font-sans-serif fs-4 d-inline-block fw-bolder" href="#">falcon</a>
                      <p class="opacity-75 text-white">Falcon yordamida UI dizaynni bizga topshirib, faqat funksionallikka e'tibor qarating!</p>
                    </div>
                  </div>
                  <div class="mt-3 mb-4 mt-md-4 mb-md-5 light">
                    <p class="pt-3 text-white">Akkauntingiz bormi?<br><a class="btn btn-outline-light mt-2 px-4" href="{% url 'login' %}">Log In</a></p>
                  </div>
                </div>

                <div class="col-md-7 d-flex flex-center" id="register-section">
                  <div class="p-4 p-md-5 flex-grow-1">
                    <h3>Register</h3>
                    <form method="post">
                      {% csrf_token %}
                      <div class="mb-3">
                        <label class="form-label" for="card-name">Name</label>
                        <input name="first_name" class="form-control" type="text" id="card-name" />
                      </div>
                      <div class="mb-3">
                        <label class="form-label" for="card-email">Username</label>
                        <input name="username" class="form-control" type="text" id="card-email" />
                      </div>
                      <div class="mb-3">
                        <label class="form-label" for="card-password">Password</label>
                        <input name="password" class="form-control" type="password" id="card-password" />
                      </div>
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="card-register-checkbox" />
                        <label class="form-label" for="card-register-checkbox">I accept the <a href="#!">terms </a>and <a href="#!">privacy policy</a></label>
                      </div>
                      <button class="btn btn-primary d-block w-100 mt-3" type="submit" name="submit">Register</button>
                    </form>
                    
                    <div class="position-relative mt-4">
                      <hr class="bg-300" />
                      <div class="divider-content-center">or register with</div>
                    </div>
                    
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('open-register').addEventListener('click', function() {
      var section = document.getElementById('register-section');
      
      if (section.style.display === "none" || section.style.display === "") {
        section.style.display = "flex"; // Formani ko'rsatish
        // Mobil qurilmalarda avtomatik pastga tushishi uchun:
        section.scrollIntoView({ behavior: 'smooth' });
      } else {
        section.style.display = "none"; // Qaytadan bosilsa yashirish
      }
    });
  </script>

  <script src="{% static 'vendors/popper/popper.min.js' %}"></script>
  <script src="{% static 'vendors/bootstrap/bootstrap.min.js' %}"></script>
  <script src="{% static 'vendors/fontawesome/all.min.js' %}"></script>
  <script src="{% static 'assets/js/theme.js' %}"></script>
</body>
</html>
