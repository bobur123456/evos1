<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Yetkazish manzili</title>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ" type="text/javascript"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 24px; }
        input { width: 100%; padding: 12px; border: none; background: #f0f2f5; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .row { display: flex; gap: 10px; }
        /* Xarita chiqishi uchun balandlik shart! */
        #map { width: 100%; height: 300px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; background-color: #eee; }
        .save-btn { width: 100%; padding: 15px; background-color: #007d53; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Yetkazish manzili</h2>
    <form id="addressForm">
        {% csrf_token %}
        <input type="text" id="manzil" name="manzil" placeholder="Manzil" required>
        <div class="row">
            <input type="text" id="uy" name="uy" placeholder="Uy/ofis">
            <input type="text" id="domofon" name="domofon" placeholder="Domofon">
        </div>
        <div class="row">
            <input type="text" id="kirish" name="kirish" placeholder="Kirish">
            <input type="text" id="qavat" name="qavat" placeholder="Qavat">
        </div>
        <input type="text" id="izoh" name="izoh" placeholder="Izoh">

        <div id="map"></div>

        <button type="submit" class="save-btn">Saqlash</button>
    </form>
</div>

<script>
    // Xatolikni oldini olish uchun hamma narsani ymaps.ready ichiga olamiz
    ymaps.ready(function () {
        let myMap = new ymaps.Map("map", {
            center: [41.311081, 69.240562], // Toshkent
            zoom: 12,
            controls: ['zoomControl', 'fullscreenControl']
        });

        let myPlacemark = new ymaps.Placemark(myMap.getCenter(), {}, {
            draggable: true // Markerni sudrash mumkin
        });

        myMap.geoObjects.add(myPlacemark);

        // Xarita bosilganda markerni o'sha yerga ko'chirish
        myMap.events.add('click', function (e) {
            let coords = e.get('coords');
            myPlacemark.geometry.setCoordinates(coords);
            updateAddress(coords);
        });

        // Marker sudrab to'xtatilganda manzilni olish
        myPlacemark.events.add('dragend', function () {
            updateAddress(myPlacemark.geometry.getCoordinates());
        });

        function updateAddress(coords) {
            ymaps.geocode(coords).then(function (res) {
                let firstGeoObject = res.geoObjects.get(0);
                document.getElementById('manzil').value = firstGeoObject.getAddressLine();
            });
        }
    });

    // Bazaga saqlash kodi
    document.getElementById('addressForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            manzil: document.getElementById('manzil').value,
            uy: document.getElementById('uy').value,
            domofon: document.getElementById('domofon').value,
            kirish: document.getElementById('kirish').value,
            qavat: document.getElementById('qavat').value,
            izoh: document.getElementById('izoh').value
        };

        fetch("{% url 'save_application' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === 'ok') {
                alert("Muvaffaqiyatli saqlandi!");
            } else {
                alert("Xatolik yuz berdi!");
            }
        }).catch(err => console.error("Xato:", err));
    });
</script>

</body>
</html>
