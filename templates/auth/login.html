{% load static %}
<!DOCTYPE html>
<html lang="uz" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Evos | Cyber Premium Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="{% static 'assets/css/theme.min.css' %}" rel="stylesheet">

    <style>
        :root {
            --evos-green: #00ff88;
            --evos-dark-green: #006b44;
            --bg-dark: #050a09;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* Fon animatsiyasi - Suyuq gradient */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(227, 30, 36, 0.1) 0%, transparent 40%);
            filter: blur(50px);
        }

        /* Markaziy karta */
        .login-box {
            position: relative;
            width: 400px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: 0.5s ease;
        }

        .login-box:hover {
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 25px 50px rgba(0, 255, 136, 0.1);
        }

        /* Logo stili */
        .brand-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 10px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .brand-header p {
            color: var(--evos-green);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* Inputlar dizayni */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            outline: none;
            color: #fff;
            font-size: 1rem;
            transition: 0.4s;
            box-sizing: border-box;
        }

        .input-group label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            margin-left: 10px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input:focus {
            border-color: var(--evos-green);
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        /* Cyber Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border: none;
            border-radius: 15px;
            background: var(--evos-green);
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        /* Linklar */
        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--evos-green);
        }

        /* Copyright */
        .copyright {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="bg-animate"></div>

    <div class="login-box">
        <div class="brand-header">
            <h1>EVOS</h1>
            <p>Ecosystem v2.0</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Loginni kiriting" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">System Login</button>

            <div class="footer-links">
                <a href="{% url 'register' %}">Join Us</a>
                <a href="#">Forgot Access?</a>
            </div>
        </form>
    </div>

    <div class="copyright">
        &copy; 2026 EVOS TECHNOLOGY GROUP
    </div>

    <script src="{% static 'assets/js/theme.js' %}"></script>
</body>
</html>
