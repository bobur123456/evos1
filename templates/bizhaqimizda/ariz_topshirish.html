<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariza topshirish</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Modal konteyneri */
        .form-container {
            background-color: #ffffff;
            width: 400px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* Yopish tugmasi (X) */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #333;
            cursor: pointer;
            text-decoration: none;
        }

        h1 {
            font-size: 32px;
            margin: 0 0 25px 0;
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* Input maydonlari */
        input[type="text"],
        input[type="tel"] {
            width: 100%;
            padding: 12px 15px;
            border: none;
            background-color: #f8f9fa;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        input::placeholder {
            color: #adb5bd;
        }

        /* Resume yuklash qismi */
        .file-upload {
            display: flex;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            overflow: hidden;
        }

        .file-name {
            flex-grow: 1;
            padding: 12px 15px;
            background-color: #fff;
            color: #6c757d;
            font-size: 14px;
            border-right: 1px solid #dee2e6;
        }

        .file-label {
            padding: 12px 20px;
            background-color: #fff;
            color: #000;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-label:hover {
            background-color: #f8f9fa;
        }

        #file-input {
            display: none;
        }

        /* Yuborish tugmasi */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #0d7a57; /* EVOS yashil rangi */
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: #0a6347;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="#" class="close-btn">&times;</a>
        <h1>Ariza topshirish</h1>

        <form>
            <div class="form-group">
                <label>FIO</label>
                <input type="text" placeholder="Ism Sharif">
            </div>

            <div class="form-group">
                <label>Telefon raqam</label>
                <input type="tel" placeholder="Telefon raqamingizni kiriting">
            </div>

            <div class="form-group">
                <label>Resume</label>
                <div class="file-upload">
                    <div class="file-name" id="file-name-text">Fayl tanlanmagan</div>
                    <label for="file-input" class="file-label">File tanlash</label>
                    <input type="file" id="file-input">
                </div>
            </div>

            <button type="submit" class="submit-btn">Yuborish</button>
        </form>
    </div>

    <script>
        // Tanlangan fayl nomini ko'rsatish uchun kichik skript
        document.getElementById('file-input').addEventListener('change', function() {
            var fileName = this.files[0] ? this.files[0].name : "Fayl tanlanmagan";
            document.getElementById('file-name-text').textContent = fileName;
        });
    </script>

</body>
</html>
