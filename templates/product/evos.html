<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOS - Ilovani yuklab olish</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ASOSIY STILLAR */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif, Arial;
            background-color: #f8f9fa;
        }

        /* APP SECTION KONTEYNERI */
        .app-section {
            padding: 100px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #ffffff 0%, #f1f3f5 100%);
        }

        .app-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 1fr 0.8fr;
            align-items: center;
            gap: 40px;
        }

        /* --- LOGOTIP UCHUN MAHSUS USLUB (SHRIFT SHU YERDA) --- */
        .evos-brand {
            /* Montserrat shriftini qo'llaymiz */
            font-family: 'Montserrat', sans-serif;
            color: #21a038; /* EVOS yashil rangi */
            font-size: 72px; /* Katta va ko'zga tashlanadigan */
            font-weight: 900; /* Maksimal qalinlik */
            margin: 0;
            letter-spacing: -4px; /* Harflarni bir-biriga yaqinlashtirish (Logotip effekti) */
            line-height: 1;
            text-transform: uppercase;
        }

        .evos-brand sup {
            font-size: 24px;
            top: -1.2em;
            letter-spacing: normal; /* R belgisi uchun yaqinlashtirishni o'chiramiz */
            font-weight: 700;
        }

        /* MATNLAR */
        .app-text-content {
            display: flex;
            flex-direction: column;
        }

        .app-title {
            font-size: 28px;
            color: #333;
            margin: 25px 0 10px 0;
            font-weight: 700;
        }

        .app-description {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            max-width: 450px;
        }

        .copyright-text {
            font-size: 13px;
            color: #aaa;
            margin-top: 60px;
        }

        /* TELEFON MOCKUP */
        .app-visual {
            display: flex;
            justify-content: center;
        }

        .phone-img {
            width: 100%;
            max-width: 350px;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.12));
            transition: transform 0.4s ease;
        }

        .phone-img:hover {
            transform: scale(1.05);
        }

        /* STORE VA QR */
        .download-links {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .store-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .badge-img {
            height: 45px;
            width: fit-content;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .badge-img:hover {
            transform: translateY(-3px);
        }

        .qr-wrapper {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100px;
            height: 100px;
            border: 1px solid #eee;
        }

        .qr-wrapper img {
            width: 100%;
            height: 100%;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .app-text-content, .app-description {
                margin: 0 auto;
                align-items: center;
            }
            .download-links {
                flex-direction: row;
                justify-content: center;
                margin-top: 40px;
            }
            .evos-brand {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>

    <section class="app-section">
        <div class="app-container">
            
            <div class="app-text-content">
                <a href="{% url 'aa' %}" style="text-decoration: none;">
                <h1  class="evos-brand"  >EVOS<sup>®</sup></h1>
                </a>
                
                <div class="lang-block">
                    <h2 class="app-title">EVOS yangi dasturi</h2>
                    <p  class="app-description">Sevimli taomlaringizga buyurtma berish uchun yangi EVOS ilovasi. Yuklab oling va buyurtma bering!</p>
                </div>

                <div class="lang-block">
                    <h2 class="app-title">Новое приложение EVOS</h2>
                    <p class="app-description">Теперь заказывать любимые блюда стало еще удобнее! Скачивайте новое приложение EVOS для заказа и доставки.</p>
                </div>

                <div class="copyright-text">© 2022 "MAK FOOD SERVICE" LLC</div>
            </div>

            <div class="app-visual">
                <img class="phone-img" src="https://app.evos.uz/assets/img/phone.png" alt="EVOS App Mockup">
            </div>

            <div class="download-links">
                
                <div class="store-group">
                    <img class="badge-img" src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="App Store">
                    <div class="qr-wrapper">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://apps.apple.com/uz/app/evos/id1513106142" alt="App Store QR">
                    </div>
                </div>

                <div class="store-group">
                    <img class="badge-img" src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
                    <div class="qr-wrapper">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://play.google.com/store/apps/details?id=uz.evos.app" alt="Google Play QR">
                    </div>
                </div>

            </div>

        </div>
    </section>

</body>
</html>
