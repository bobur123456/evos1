<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOS Yangiliklar</title>
    <style>
        /* Umumiy stillar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #000;
        }

        /* Grid tizimi */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Card (Karta) stili */
        .news-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        /* Rasm joyi (bo'sh qolgan joylar uchun) */
        .image-placeholder {
            width: 100%;
            aspect-ratio: 16 / 10;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        /* Rasmdagi kichik "not found" belgisi o'rniga ramka */
        .image-placeholder::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            width: 20px;
            height: 15px;
            border: 1px solid #ccc;
        }

        /* Matn qismi */
        .content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            align-items: flex-start;
        }

        .content p {
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            font-weight: 500;
        }

        /* Mobil qurilmalar uchun moslashuv */
        @media (max-width: 600px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            h2 {
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Yangiliklar</h2>

    <div class="news-grid">
        <div class="news-card">
            <div class="image-placeholder"></div>
            <div class="content">
                <p>Yaxshi nonushtaga — EVOSga!</p>
            </div>
        </div>

        <div class="news-card">
            <div class="image-placeholder"></div>
            <div class="content">
                <p>«EVOS»NING BARCHA RESTORANLARIDA YANADA KO'PROQ KOMBO</p>
            </div>
        </div>

        <div class="news-card">
            <div class="image-placeholder"></div>
            <div class="content">
                <p>Table Service yangi xizmati: Sizning qulayligingiz - bizning ustuvor vazifamiz!</p>
            </div>
        </div>

        <div class="news-card">
            <div class="image-placeholder"></div>
            <div class="content">
                <p>EVOS bolalar maydonchalari: rivojlanish va quvonch uchun qulay makon.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
